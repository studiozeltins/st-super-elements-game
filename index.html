<!doctype html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c110e" />
    <!-- Launch fullscreen (no browser chrome) when added to the home screen.
         iOS Safari has no in-browser element fullscreen, so this is the only
         real fullscreen path on iPhone. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Super Elements" />
    <!-- Fonts are self-hosted via @fontsource (imported in main.tsx) so the game
         works fully offline over LAN and carries the Latvian latin-ext glyphs. -->
    <title>Super Elements</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
